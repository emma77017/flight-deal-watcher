name: full-scan
on:
  schedule:
    # 15:05/03:05 UTC = 8:05am/8:05pm Pacific in summer (7:05 in winter - fine)
    - cron: '5 15 * * *'
    - cron: '5 3 * * *'
  workflow_dispatch:
    inputs:
      args:
        description: "watcher.py arguments"
        default: "scan"

permissions:
  contents: write

concurrency:
  group: flight-watcher
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: cp config.cloud.toml config.toml
      - name: scan
        env:
          FDW_EMAIL: ${{ secrets.EMAIL_ADDRESS }}
          FDW_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python watcher.py ${{ inputs.args || 'scan' }}
      - name: persist alert-dedup state
        if: always()
        run: |
          git config user.name "flight-watcher-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/watcher.db logs/deals.log 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "state: $(date -u +%Y-%m-%d_%H%M) [skip ci]"
            git push || (git pull --rebase -X theirs && git push) || echo "state push failed (will re-alert, never lose)"
          fi

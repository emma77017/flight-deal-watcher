name: full-scan
on:
  schedule:
    # 15:05/03:05 UTC = 8:05am/8:05pm Pacific in summer (7:05 in winter - fine)
    - cron: '5 15 * * *'
    - cron: '5 3 * * *'
  workflow_dispatch:
    inputs:
      args:
        description: "watcher.py arguments"
        default: "scan"

permissions:
  contents: read

concurrency:
  group: flight-watcher
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      # alert-dedup DB rides the actions cache between runs; worst case on cache
      # eviction is a duplicate alert, never a missed one
      - uses: actions/cache@v4
        with:
          path: data
          key: watcher-state-${{ github.run_id }}
          restore-keys: watcher-state-
      - run: pip install -r requirements.txt
      - run: cp config.cloud.toml config.toml
      - name: scan
        env:
          FDW_EMAIL: ${{ secrets.EMAIL_ADDRESS }}
          FDW_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python watcher.py ${{ inputs.args || 'scan' }}

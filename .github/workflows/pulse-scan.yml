name: pulse-scan
on:
  schedule:
    - cron: '20 */2 * * *'   # every 2 hours, offset from the full scans

permissions:
  contents: read

concurrency:
  group: flight-watcher      # shared with full-scan: never overlap
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/cache@v4
        with:
          path: data
          key: watcher-state-${{ github.run_id }}
          restore-keys: watcher-state-
      - run: pip install -r requirements.txt
      - run: cp config.cloud.toml config.toml
      - name: pulse scan
        env:
          FDW_EMAIL: ${{ secrets.EMAIL_ADDRESS }}
          FDW_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python watcher.py scan --pulse

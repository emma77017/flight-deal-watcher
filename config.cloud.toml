[email]
enabled = true
to = ""            # overridden by FDW_EMAIL secret
smtp_host = "smtp.gmail.com"
smtp_port = 587
username = ""      # overridden by FDW_EMAIL secret
app_password = ""  # overridden by FDW_APP_PASSWORD secret

[sms]
enabled = false
phone_number = ""

[imessage]
enabled = false
phone_number = ""

[notify]
macos = false
stale_hours = 30

[promos]
# Announcement watcher: reads the deal blogs that broke every historical promo
# (piao.tips / pointstalent are the WeChat outlets behind screenshots like the
# Tokyo-Seattle one). Enabled on the Pi via FDW_PROMOS=1; off elsewhere to avoid
# duplicate emails.
enabled = false
feeds = [
  "https://piao.tips/feed",
  "https://www.pointstalent.com/feed",
  "https://sky-budget.com/feed",
  "https://www.secretflying.com/feed",
]
keywords_cabin = ["商务舱", "公务舱", "头等舱", "business", "polaris", "first class"]
keywords_origin = ["上海", "杭州", "浦东", "东京", "成田", "首尔", "仁川", "中国", "shanghai", "hangzhou", "pvg", "tokyo", "narita", "seoul", "incheon", "china"]
keywords_dest = ["美国", "北美", "洛杉矶", "西雅图", "旧金山", "夏威夷", "檀香山", "圣地亚哥", "los angeles", "lax", "seattle", "san francisco", "hawaii", "honolulu", "san diego", "usa", "united states", "north america", "transpacific"]
promo_max_usd = 3800   # email only when a post names a price at/under this
cny_per_usd = 7.2

# Cloud (GitHub Actions) configuration - same watch rules as the local Mac copy,
# but credentials/addresses come from repo secrets (FDW_EMAIL / FDW_APP_PASSWORD env)
# and phone channels are off (no Messages.app in the cloud; email push reaches the
# phone via the Gmail app instead).

[search]
window_start_days = 21
window_end_days = 180
adults = 2
seat = "business"
currency = "USD"
max_queries_per_run = 1000
one_way_fallback = true
delay_seconds = [1.5, 4.0]

[deal]
max_price_per_person = 3800
max_stops = 1
min_layover_minutes = 90
max_layover_minutes = 360
max_total_hours = 26
re_alert_drop = 100

[[routes]]
origin = "PVG"
destination = "LAX"
departure_step_days = 7
trip_length_days = [14, 21, 28]


# ============ Emma & husband: Europe trip (economy watches; business pending) ============
# 14-day trip. Weather rule (32C/5C) allows departures ONLY Apr 15-Jun 15 and
# Sep 1-Oct 15; the second exclude range wraps New Year. Bars from verified
# 24-month history: routine sale $440-500 RT, sub-$400 = rare flash.
[[openjaw_routes]]
legs = [["SAN", "LHR"], ["FCO", "LAX"]]
max_stops = 0
seat = "economy"
alert_below = 800
departure_step_days = 14
gap_days = [13, 14, 15]
window_end_days = 330
exclude_dep_ranges = [["06-16", "08-31"], ["10-16", "04-14"]]
note = "EUROPE TRIP Option B: SAN>London out, Rome>LAX home"

